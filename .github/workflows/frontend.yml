name: Frontend

on:
  pull_request:
    paths:
      - "server/app/**"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - master
    paths:
      - "server/app/**"
      - ".github/workflows/frontend.yml"

jobs:
  frontend:
    name: Lint, typecheck, test, build, e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit / component tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E tests against the mock IRC server
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: server/app/playwright-report/
          retention-days: 7
